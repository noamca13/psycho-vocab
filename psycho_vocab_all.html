<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="פסיכו אנגלית">
<meta name="theme-color" content="#0f0f13">
<title>פסיכומטרי אנגלית</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&family=Space+Grotesk:wght@400;600;700&display=swap');
:root {
  --bg:#0f0f13; --surface:#1a1a24; --surface2:#22222f; --border:#2e2e42;
  --accent:#7c6dfa; --accent2:#a78bfa; --green:#22c55e; --red:#ef4444;
  --yellow:#eab308; --text:#e8e8f0; --muted:#6b6b8a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;overflow-x:hidden}

/* HOME */
#home{padding:20px 16px 60px}
.home-header{text-align:center;margin-bottom:24px;padding-top:8px}
.home-title{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--accent2);margin-bottom:4px}
.home-sub{font-size:13px;color:var(--muted)}
.home-stats{display:flex;justify-content:center;gap:12px;margin-top:14px}
.hstat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 18px;text-align:center;min-width:90px}
.hstat-val{font-size:22px;font-weight:900;color:var(--accent2)}
.hstat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.hstat.streak .hstat-val{color:#f97316}
.list-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.list-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 14px;cursor:pointer;transition:all .2s;position:relative}
.list-card:active{transform:scale(.97);background:var(--surface2)}
.list-card.has-prog{border-color:var(--accent)}
.list-num{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.list-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.3}
.lbar-wrap{background:var(--surface2);border-radius:3px;height:3px;overflow:hidden;margin-bottom:6px}
.lbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
.lbar-stats{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.lbar-stats .pct{color:var(--accent2);font-weight:600}

/* STUDY */
#study{display:none}
.study-hdr{padding:12px 16px 0;display:flex;align-items:center;gap:10px}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap}
.back-btn:active{background:var(--border)}
.study-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--accent2);flex:1;text-align:center}
.hdr-mastered{font-size:11px;color:var(--muted);white-space:nowrap}
.hdr-mastered span{color:var(--green);font-weight:700}

.tabs{display:flex;gap:4px;padding:10px 16px 0}
.tab{flex:1;padding:8px 0;border:none;border-radius:10px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:var(--surface2);color:var(--muted)}
.tab.active{background:var(--accent);color:#fff}

.view{display:none;padding:12px 16px 80px}
.view.active{display:block}

/* CARDS */
.mode-bar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.mode-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Heebo',sans-serif;font-size:11px;cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pbar-wrap{background:var(--surface2);border-radius:3px;height:3px;margin-bottom:10px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}

.card-wrap{perspective:1200px;height:280px;cursor:pointer;user-select:none}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-inner.sr{box-shadow:0 0 28px rgba(34,197,94,.4)}
.card-inner.sl{box-shadow:0 0 28px rgba(239,68,68,.4)}
.card-face{position:absolute;inset:0;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;backface-visibility:hidden;-webkit-backface-visibility:hidden;text-align:center}
.card-front{background:linear-gradient(145deg,var(--surface),var(--surface2));border:1px solid var(--border)}
.card-back{background:linear-gradient(145deg,#1e1b40,#16132e);border:1px solid var(--accent);transform:rotateY(180deg)}
.ctype{font-size:10px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:10px;margin-bottom:6px;font-family:'Space Grotesk',sans-serif}
.cen{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:3px}
.cpron{font-size:11px;color:var(--muted);margin-top:3px;min-height:14px;direction:rtl}
.ctap{font-size:11px;color:var(--muted);margin-top:12px}
.che{font-size:22px;font-weight:700;color:var(--accent2);margin-bottom:5px;direction:rtl;line-height:1.3}
.censm{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--muted);margin-top:6px}
.ctip{font-size:10px;color:var(--yellow);background:rgba(234,179,8,.1);padding:3px 8px;border-radius:7px;margin-top:5px}

.card-btns{display:none;gap:8px;margin-top:10px}
.card-btns.visible{display:flex}
.btn-knew{flex:1;padding:12px;border:1px solid rgba(34,197,94,.3);border-radius:13px;background:rgba(34,197,94,.12);color:var(--green);font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-knew:active{background:rgba(34,197,94,.3);transform:scale(.97)}
.btn-didnt{flex:1;padding:12px;border:1px solid rgba(239,68,68,.3);border-radius:13px;background:rgba(239,68,68,.12);color:var(--red);font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-didnt:active{background:rgba(239,68,68,.3);transform:scale(.97)}
.card-counter{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
.swipe-hint{text-align:center;font-size:10px;color:var(--muted);margin-top:5px}

.ses-done{display:none;text-align:center;padding:28px 12px}
.ses-done.visible{display:block}
.done-icon{font-size:52px;margin-bottom:12px}
.done-title{font-size:20px;font-weight:700;margin-bottom:5px}
.done-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.done-score{display:flex;justify-content:center;gap:18px;margin-bottom:20px}
.done-num{text-align:center}
.done-num .big{font-size:30px;font-weight:900}
.done-num .lbl{font-size:10px;color:var(--muted)}
.btn-restart{background:var(--accent);color:#fff;border:none;border-radius:13px;padding:12px 24px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;max-width:280px}
.btn-restart:active{opacity:.8}

/* QUIZ */
.quiz-q{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:20px;text-align:center;margin-bottom:12px}
.quiz-word{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-bottom:3px}
.quiz-pron{font-size:11px;color:var(--muted);min-height:14px;margin-bottom:2px}
.quiz-type{font-size:10px;color:var(--muted)}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.opt-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:13px;padding:12px 8px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;direction:rtl;text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center;line-height:1.3}
.opt-btn:active{transform:scale(.97)}
.opt-btn.correct{background:rgba(34,197,94,.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(239,68,68,.2);border-color:var(--red);color:var(--red)}
.opt-btn.disabled{pointer-events:none}
.quiz-fb{display:none;text-align:center;padding:9px;border-radius:11px;font-size:12px;font-weight:600;margin-top:9px}
.quiz-fb.show{display:block}
.quiz-fb.ok{background:rgba(34,197,94,.1);color:var(--green)}
.quiz-fb.bad{background:rgba(239,68,68,.1);color:var(--red)}
.quiz-next{width:100%;margin-top:9px;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:13px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:none}
.quiz-next.show{display:block}

/* PROGRESS */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:14px;text-align:center}
.kpi-val{font-size:26px;font-weight:900;color:var(--accent2)}
.kpi-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.prog-sec{margin-bottom:16px}
.prog-sec-title{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.wchip{display:inline-block;padding:3px 9px;border-radius:18px;font-size:10px;margin:2px;font-family:'Space Grotesk',sans-serif}
.chip-hard{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.chip-good{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.reset-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:11px;color:var(--muted);font-family:'Heebo',sans-serif;font-size:12px;cursor:pointer}
.reset-btn:active{background:var(--surface2)}
</style>
</head>
<body>

<div id="home">
  <div class="home-header">
    <div class="home-title">🧠 פסיכומטרי אנגלית</div>
    <div class="home-sub">בחר רשימה לתרגול</div>
  <div class="home-stats">
    <div class="hstat streak"><div class="hstat-val" id="stat-streak">0 🔥</div><div class="hstat-lbl">ימים ברצף</div></div>
    <div class="hstat"><div class="hstat-val" id="stat-seen">0 👁</div><div class="hstat-lbl">מילים שנראו</div></div>
  </div>
  </div>
  <div class="list-grid" id="list-grid"></div>
</div>

<div id="study">
  <div class="study-hdr">
    <button class="back-btn" onclick="goHome()">← חזרה</button>
    <div class="study-title" id="study-title"></div>
    <div class="hdr-mastered">שולטים: <span id="hdr-m">0</span></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('cards')">כרטיסיות</button>
    <button class="tab" onclick="switchTab('quiz')">חידון</button>
    <button class="tab" onclick="switchTab('progress')">התקדמות</button>
  </div>

  <div class="view active" id="view-cards">
    <div class="mode-bar">
      <button class="mode-btn active" id="mode-all" onclick="setMode('all')">כל המילים</button>
      <button class="mode-btn" id="mode-hard" onclick="setMode('hard')">קשות</button>
      <button class="mode-btn" id="mode-new" onclick="setMode('new')">לא נראו</button>
    </div>
    <div class="pbar-wrap"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>
    <div id="card-area">
      <div class="card-wrap" id="card-wrap" onclick="flipCard()">
        <div class="card-inner" id="card-inner">
          <div class="card-face card-front">
            <div class="ctype" id="cf-type"></div>
            <div class="cen" id="cf-en"></div>
            <div class="cpron" id="cf-pron"></div>
            <div class="ctap">הקש לגילוי</div>
          </div>
          <div class="card-face card-back">
            <div class="che" id="cb-he"></div>
            <div class="ctype" id="cb-type"></div>
            <div class="censm" id="cb-en"></div>
            <div class="cpron" id="cb-pron"></div>
            <div class="ctip" id="cb-tip" style="display:none"></div>
          </div>
        </div>
      </div>
      <div class="swipe-hint">החלק ימינה ✓ / שמאלה ✗ · הקש לגילוי</div>
      <div class="card-btns" id="card-btns">
        <button class="btn-knew" onclick="rateCard(true)">✓ ידעתי</button>
        <button class="btn-didnt" onclick="rateCard(false)">✗ לא ידעתי</button>
      </div>
      <div class="card-counter" id="card-counter"></div>
    </div>
    <div class="ses-done" id="ses-done">
      <div class="done-icon">🎉</div>
      <div class="done-title">סיום סשן!</div>
      <div class="done-sub" id="done-sub"></div>
      <div class="done-score">
        <div class="done-num"><div class="big" style="color:var(--green)" id="d-knew">0</div><div class="lbl">ידעתי</div></div>
        <div class="done-num"><div class="big" style="color:var(--red)" id="d-didnt">0</div><div class="lbl">לא ידעתי</div></div>
        <div class="done-num"><div class="big" style="color:var(--accent2)" id="d-pct">0%</div><div class="lbl">דיוק</div></div>
      </div>
      <button class="btn-restart" onclick="restartSes()">סשן חדש 🔄</button>
    </div>
  </div>

  <div class="view" id="view-quiz">
    <div id="quiz-area">
      <div class="pbar-wrap"><div class="pbar-fill" id="qbar" style="width:0%"></div></div>
      <div class="quiz-q">
        <div class="quiz-word" id="q-word"></div>
        <div class="quiz-pron" id="q-pron"></div>
        <div class="quiz-type" id="q-type"></div>
      </div>
      <div class="quiz-opts" id="quiz-opts"></div>
      <div class="quiz-fb" id="quiz-fb"></div>
      <button class="quiz-next" id="quiz-next" onclick="nextQuiz()">הבא ›</button>
    </div>
    <div class="ses-done" id="quiz-done">
      <div class="done-icon">🏆</div>
      <div class="done-title">חידון הסתיים!</div>
      <div class="done-sub" id="qd-sub"></div>
      <div class="done-score">
        <div class="done-num"><div class="big" style="color:var(--green)" id="qd-ok">0</div><div class="lbl">נכון</div></div>
        <div class="done-num"><div class="big" style="color:var(--red)" id="qd-bad">0</div><div class="lbl">שגוי</div></div>
        <div class="done-num"><div class="big" style="color:var(--accent2)" id="qd-pct">0%</div><div class="lbl">דיוק</div></div>
      </div>
      <button class="btn-restart" onclick="startQuiz()">חידון חדש 🔄</button>
    </div>
  </div>

  <div class="view" id="view-progress">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-val" id="p-seen">0</div><div class="kpi-lbl">נראו</div></div>
      <div class="kpi-card"><div class="kpi-val" id="p-mastered">0</div><div class="kpi-lbl">שולטים</div></div>
      <div class="kpi-card"><div class="kpi-val" id="p-acc">—</div><div class="kpi-lbl">דיוק</div></div>
      <div class="kpi-card"><div class="kpi-val" id="p-ses">0</div><div class="kpi-lbl">סשנים</div></div>
    </div>
    <div class="prog-sec">
      <div class="prog-sec-title">🔴 קשות לחזרה</div>
      <div id="hard-list">—</div>
    </div>
    <div class="prog-sec">
      <div class="prog-sec-title">🟢 שנשלטו</div>
      <div id="good-list">—</div>
    </div>
    <button class="reset-btn" onclick="confirmReset()">איפוס התקדמות לרשימה זו</button>
  </div>
</div>

// STREAK + SEEN
const STREAK_KEY='psycho_streak_v1';
function getStreakData(){
  try{return JSON.parse(localStorage.getItem(STREAK_KEY)||'{"streak":0,"lastDay":""}');}
  catch(e){return{streak:0,lastDay:''};} 
}
function updateStreak(){
  const today=new Date().toISOString().slice(0,10);
  const d=getStreakData();
  if(d.lastDay===today)return d.streak;
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const streak=d.lastDay===yesterday?d.streak+1:1;
  try{localStorage.setItem(STREAK_KEY,JSON.stringify({streak,lastDay:today}));}catch(e){}
  return streak;
}
function getTotalSeen(){
  let total=0;
  for(let i=1;i<=10;i++){
    const st=getSt(i);
    const w=ALL_LISTS[String(i)]||{};
    Object.keys(st.seen).forEach(k=>{if(w[k])total++;});
  }
  return total;
}
function updateHomeStats(){
  const streak=updateStreak();
  const seen=getTotalSeen();
  document.getElementById('stat-streak').textContent=streak+' 🔥';
  document.getElementById('stat-seen').textContent=seen+' 👁';
}

function savePron(){try{localStorage.setItem(PRON,JSON.stringify(pronCache))}catch(e){}}
function getSt(n){if(!gState[n])gState[n]={scores:{},seen:{},sessions:0,correct:0,answered:0};return gState[n]}

let curList=null,curWords=null,curAll=null;

// HOME
function buildHome(){
  const g=document.getElementById('list-grid');
  g.innerHTML='';
  updateHomeStats();
  for(let i=1;i<=10;i++){
    const w=ALL_LISTS[String(i)]||{};
    const total=Object.keys(w).length;
    const st=getSt(i);
    const mastered=Object.keys(w).filter(k=>(st.scores[k]||0)>=3).length;
    const seen=Object.keys(st.seen).filter(k=>w[k]).length;
    const pct=total?Math.round(mastered/total*100):0;
    g.innerHTML+=`<div class="list-card ${seen>0?'has-prog':''}" onclick="openList(${i})">
      <div class="list-name">${LIST_NAMES[i]}</div>
      <div class="lbar-wrap"><div class="lbar-fill" style="width:${pct}%"></div></div>
      <div class="lbar-stats"><span>${total} מילים</span><span class="pct">${pct}% ✓</span></div>
    </div>`;
  }
}

  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));

  startSes(true);
}

  document.getElementById('home').style.display='block';
  buildHome(); curList=null;
}

// PRONUNCIATION
async function getPron(word){
  if(pronCache[word])return pronCache[word];
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:60,
        messages:[{role:'user',content:`תעתיק עברי פונטי בלבד של: "${word}". רק תעתיק.`}]})
    });
    const d=await r.json();
    const p=d.content?.[0]?.text?.trim()||'';
    if(p){pronCache[word]=p;savePron();}
    return p;
  }catch(e){return'';}
}
async function setPron(word,...ids){
  ids.forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=pronCache[word]||'…';});
  if(pronCache[word])return;
  const p=await getPron(word);
  ids.forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=p;});
}

// FLASHCARDS
let mode='all',deck=[],deckIdx=0,flipped=false,sKnew=0,sDidnt=0;
function buildDeck(){
  const st=getSt(curList);
  let words;
  if(mode==='hard'){words=curAll.filter(w=>(st.scores[w]||0)<0);if(!words.length)words=curAll;}
  else if(mode==='new'){words=curAll.filter(w=>!st.seen[w]);if(!words.length)words=curAll;}
  else words=[...curAll];
  deck=words.sort((a,b)=>((st.scores[a]||0)+Math.random()*4)-((st.scores[b]||0)+Math.random()*4)).slice(0,20);
  deckIdx=0;sKnew=0;sDidnt=0;flipped=false;
}
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+m).classList.add('active');
  startSes(false);
}
function startSes(count=true){
  const st=getSt(curList);
  if(count){st.sessions++;saveSt();}
  buildDeck();
  document.getElementById('ses-done').classList.remove('visible');
  document.getElementById('card-area').style.display='';
  showCard();
}
function showCard(){
  if(deckIdx>=deck.length){endSes();return;}
  const w=deck[deckIdx];
  const[he,type,tip]=curWords[w]||['','',''];
  flipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('cf-en').textContent=w;
  document.getElementById('cf-type').textContent=type||'';
  setPron(w,'cf-pron','cb-pron');
  clearTimeout(window._bt);
  window._bt=setTimeout(()=>{
    document.getElementById('cb-he').textContent=he;
    document.getElementById('cb-type').textContent=type||'';
    document.getElementById('cb-en').textContent=w;
    const t=document.getElementById('cb-tip');
    if(tip){t.textContent='💡 '+tip;t.style.display='';}else t.style.display='none';
  },460);
  document.getElementById('card-btns').classList.remove('visible');
  document.getElementById('card-counter').textContent=(deckIdx+1)+' / '+deck.length;
  document.getElementById('pbar').style.width=(deckIdx/deck.length*100)+'%';
  updateHdr();
}
function flipCard(){
  if(flipped)return;
  flipped=true;
  document.getElementById('card-inner').classList.add('flipped');
  document.getElementById('card-btns').classList.add('visible');
  const st=getSt(curList);
  st.seen[deck[deckIdx]]=(st.seen[deck[deckIdx]]||0)+1;
  saveSt();
}
function rateCard(knew){
  const w=deck[deckIdx];const st=getSt(curList);
  if(knew){st.scores[w]=(st.scores[w]||0)+1;st.correct++;sKnew++;}
  else{st.scores[w]=(st.scores[w]||0)-2;sDidnt++;}
  st.answered++;saveSt();deckIdx++;showCard();
}
function endSes(){
  document.getElementById('card-area').style.display='none';
  document.getElementById('ses-done').classList.add('visible');
  const t=sKnew+sDidnt,pct=t?Math.round(sKnew/t*100):0;
  document.getElementById('d-knew').textContent=sKnew;
  document.getElementById('d-didnt').textContent=sDidnt;
  document.getElementById('d-pct').textContent=pct+'%';
  document.getElementById('done-sub').textContent='עברת על '+t+' מילים';
  document.getElementById('pbar').style.width='100%';
  updateHdr();
}
function restartSes(){
  document.getElementById('ses-done').classList.remove('visible');
  document.getElementById('card-area').style.display='';
  startSes(true);
}

// QUIZ
let qDeck=[],qIdx=0,qOk=0,qBad=0;
function startQuiz(){
  document.getElementById('quiz-done').classList.remove('visible');
  document.getElementById('quiz-area').style.display='';
  const st=getSt(curList);
  qDeck=[...curAll].sort((a,b)=>((st.scores[a]||0)+Math.random()*4)-((st.scores[b]||0)+Math.random()*4)).slice(0,20);
  qIdx=0;qOk=0;qBad=0;
  document.getElementById('qbar').style.width='0%';
  showQuiz();
}
function showQuiz(){
  if(qIdx>=qDeck.length){endQuiz();return;}
  const w=qDeck[qIdx];const[he,type]=curWords[w]||['',''];
  document.getElementById('q-word').textContent=w;
  setPron(w,'q-pron');
  document.getElementById('q-type').textContent=type||'';
  document.getElementById('quiz-fb').className='quiz-fb';
  document.getElementById('quiz-next').className='quiz-next';
  const others=curAll.filter(k=>k!==w).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[...others,w].sort(()=>Math.random()-.5);
  const cont=document.getElementById('quiz-opts');
  cont.innerHTML='';
  opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt-btn';b.textContent=(curWords[opt]||[''])[0];
    b.onclick=()=>checkQuiz(b,opt,w);cont.appendChild(b);
  });
  document.getElementById('qbar').style.width=(qIdx/qDeck.length*100)+'%';
}
function checkQuiz(btn,chosen,correct){
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.add('disabled'));
  const fb=document.getElementById('quiz-fb');const st=getSt(curList);
  if(chosen===correct){
    btn.classList.add('correct');fb.textContent='✓ נכון!';fb.className='quiz-fb show ok';
    st.scores[correct]=(st.scores[correct]||0)+1;qOk++;
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===(curWords[correct]||[''])[0])b.classList.add('correct');});
    fb.textContent='✗ שגוי — '+(curWords[correct]||[''])[0];fb.className='quiz-fb show bad';
    st.scores[correct]=(st.scores[correct]||0)-2;qBad++;
  }
  st.answered++;saveSt();
  document.getElementById('quiz-next').className='quiz-next show';
}
function nextQuiz(){qIdx++;showQuiz();}
function endQuiz(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('quiz-done').classList.add('visible');
  const t=qOk+qBad,pct=t?Math.round(qOk/t*100):0;
  document.getElementById('qd-ok').textContent=qOk;
  document.getElementById('qd-bad').textContent=qBad;
  document.getElementById('qd-pct').textContent=pct+'%';
  document.getElementById('qd-sub').textContent=pct>=80?'🔥 מצוין! '+pct+'% דיוק':pct>=60?'👍 טוב! '+pct+'%':'💪 '+pct+'% — חזור על הכרטיסיות';
}

// PROGRESS
function updateProgress(){
  const st=getSt(curList);
  const seen=Object.keys(st.seen).filter(w=>curWords[w]).length;
  const mastered=curAll.filter(w=>(st.scores[w]||0)>=3).length;
  document.getElementById('p-seen').textContent=seen;
  document.getElementById('p-mastered').textContent=mastered;
  document.getElementById('p-acc').textContent=st.answered?Math.round(st.correct/st.answered*100)+'%':'—';
  document.getElementById('p-ses').textContent=st.sessions;
  const hard=curAll.filter(w=>(st.scores[w]||0)<-1&&st.seen[w]).sort((a,b)=>(st.scores[a]||0)-(st.scores[b]||0)).slice(0,20);
  document.getElementById('hard-list').innerHTML=hard.length?hard.map(w=>`<span class="wchip chip-hard">${w}</span>`).join(''):'<span style="color:var(--muted);font-size:11px">אין עדיין</span>';
  const good=curAll.filter(w=>(st.scores[w]||0)>=3).slice(0,20);
  document.getElementById('good-list').innerHTML=good.length?good.map(w=>`<span class="wchip chip-good">${w}</span>`).join(''):'<span style="color:var(--muted);font-size:11px">עדיין אין</span>';
}
function updateHdr(){
  if(!curList)return;
  const st=getSt(curList);
  document.getElementById('hdr-m').textContent=curAll.filter(w=>(st.scores[w]||0)>=3).length;
}
function confirmReset(){
  if(confirm('לאפס התקדמות ב'+LIST_NAMES[curList]+'?')){
    gState[curList]={scores:{},seen:{},sessions:0,correct:0,answered:0};
    saveSt();updateProgress();updateHdr();startSes(false);
  }
}

// TABS
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['cards','quiz','progress'][i]===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='quiz')startQuiz();
  if(tab==='progress')updateProgress();
}

// SWIPE
(function(){
  const card=document.getElementById('card-wrap');
  let sx=0,sy=0;
  card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!flipped)return;
    const dx=e.touches[0].clientX-sx;
    const inner=document.getElementById('card-inner');
    if(dx>30)inner.classList.add('sr'),inner.classList.remove('sl');
    else if(dx<-30)inner.classList.add('sl'),inner.classList.remove('sr');
    else inner.classList.remove('sr','sl');
  },{passive:true});
  card.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    document.getElementById('card-inner').classList.remove('sr','sl');
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(!flipped){flipCard();return;}
      rateCard(dx>0);
    }
  },{passive:true});
})();

buildHome();
</script>
